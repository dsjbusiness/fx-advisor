# FX Advisor - kalendarz wydarzen makro 2026
#
# Format (parsowany przez data_layer.load_events, prosty podzbior YAML):
#   year: RRRR
#   events:
#     - date: RRRR-MM-DD        # dzien OGLOSZENIA (dla posiedzen: drugi dzien)
#       source: NBP|ECB|Fed|BLS|GUS
#       name: opis po polsku
#       currencies: [PLN]       # waluty, na ktore wydarzenie wplywa
#       impact: high|medium
#
# Rok 2027: dodaj plik data/events_2027.yaml w tym samym formacie -
# narzedzie laduje wszystkie pliki data/events_*.yaml.
#
# Zrodla dat:
#   NBP RPP: nbp.pl -> Polityka pieniezna -> harmonogram posiedzen
#            (wrzesien-grudzien wg konwencji pierwszy wt-sr miesiaca; ZWERYFIKUJ
#             na nbp.pl gdy NBP opublikuje/zmieni harmonogram II polrocza)
#   ECB: ecb.europa.eu (decyzje w czwartki, ogloszenie ~14:15 CET)
#   Fed/FOMC: federalreserve.gov (ogloszenie ~20:00 czasu PL, drugi dzien)
#   US CPI: bls.gov schedule (~14:30 czasu PL); daty orientacyjne - zweryfikuj
#   US NFP: pierwszy piatek miesiaca (styczen i lipiec przesuniete - swieta)
#   PL CPI: GUS - szybki szacunek ~ostatni dzien roboczy miesiaca,
#           odczyt finalny ~15. dnia kolejnego miesiaca

