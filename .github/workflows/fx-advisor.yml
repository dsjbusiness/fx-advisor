name: FX Advisor

on:
  schedule:
    # Dni robocze (cron w UTC). Fixing EBC publikowany ~16:00 CET:
    - cron: "30 6 * * 1-5"    # ~08:30 PL - poranny przeglad (ostatni fixing)
    - cron: "30 14 * * 1-5"   # ~16:30 PL - po publikacji fixingu EBC
  workflow_dispatch: {}       # reczne uruchomienie z zakladki Actions

permissions:
  contents: write             # zapis raportu, historii i backtestu do repo

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Testy jednostkowe (matematyka wskaznikow + logika deadline) - szybkie.
      - name: Run unit tests
        run: python -m unittest discover -s tests

      # Backtest: cache w data/backtest.json - pelny przelicz najwyzej raz
      # na tydzien (albo przy zmianie wersji silnika / duzej paczce nowych
      # sesji), wiec dzienny bieg pozostaje szybki.
      - name: Run FX Advisor
        env:
          FX_EMAIL_ENABLED: "1"
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FX_EMAIL_FROM: ${{ secrets.FX_EMAIL_FROM }}
          FX_EMAIL_TO: ${{ secrets.FX_EMAIL_TO }}
        run: |
          python main.py --out docs/index.html

      - name: Commit report + data
        run: |
          git config user.name "fx-advisor-bot"
          git config user.email "bot@users.noreply.github.com"
          # pliki stanu sa w .gitignore (blokuje przypadkowe lokalne commity);
          # workflow jest jedynym miejscem, ktore ma je utrwalac -> -f
          git add docs/index.html data/history.json data/backtest.json
          git add -f fx_state.json
          [ -f fx_email_state.json ] && git add -f fx_email_state.json || true
          git commit -m "FX report $(date -u +%Y-%m-%d)" || echo "brak zmian"
          git push || echo "push nieudany (sprawdz permissions: contents: write)"
